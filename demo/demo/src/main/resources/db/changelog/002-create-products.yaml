databaseChangeLog:
  - changeSet:
      id: 002-create-products
      author: zoe
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: products
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: price
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: stock
                  type: int
                  defaultValueNumeric: 0 # 建議設定預設值為 0，避免現有資料出錯
                  constraints:
                    nullable: false                                                 
              - column:
                  name: image_url
                  type: varchar(500)
              - column:
                  name: category
                  type: varchar(100)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP