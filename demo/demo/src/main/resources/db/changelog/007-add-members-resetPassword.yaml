databaseChangeLog:
  - changeSet:
      id: 007-add-members-resetPassword.yaml
      author: zoe
      changes:
        - addColumn:
            tableName: members
            columns:
              - column:
                  name: reset_token
                  type: varchar(255)
                  remarks: "重設密碼令牌"
              - column:
                  name: reset_token_expiry_time
                  type: datetime
                  remarks: "重設密碼令牌失效時間"