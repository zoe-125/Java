<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/resetPassword.css">
</head>
<body>
    <div id="message-toast" class="toast-hidden"></div>

    <div class="auth-wrapper">
        <h2 class="auth-title">設定新密碼</h2>
        <form id="resetPasswordForm">
            <input type="hidden" id="token">
            
            <div class="input-group">
                <label for="newPassword">新密碼</label>
                <input type="password" id="newPassword" placeholder="至少 8 位字元" required>
            </div>
            <div class="input-group">
                <label for="confirmPassword">確認新密碼</label>
                <input type="password" id="confirmPassword" placeholder="再次輸入新密碼" required>
            </div>
            <button type="submit" id="btn-submit" class="btn-momo">確認修改</button>
        </form>
        
        <div class="auth-footer">
            <a href="/login.html">返回登入</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/static/js/resetPassword.js"></script>
</body>
</html>
