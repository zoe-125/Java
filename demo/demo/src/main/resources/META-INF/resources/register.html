<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMO 風格 - 會員註冊</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div id="message-toast" class="toast-hidden"></div>

    <div class="auth-wrapper">
        <h2 class="auth-title">JOIN US</h2>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="username">使用者名稱</label>
                <input type="text" id="username" placeholder="請輸入姓名" required>
            </div>

            <div class="input-group">
                <label for="email">電子信箱</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>

            <div class="input-group">
                <label for="password">設定密碼</label>
                <input type="password" id="password" placeholder="至少 6 位字元" required>
            </div>

            <div class="input-group">
                <label for="confirmPassword">確認密碼</label>
                <input type="password" id="confirmPassword" placeholder="請再次輸入密碼" required>
            </div>

            <button type="submit" class="btn-momo">立即註冊</button>
        </form>

        <div class="auth-footer">
            已經有帳號了？ <a href="/login.html">點我登入</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/static/js/register.js"></script>
</body>
</html>
