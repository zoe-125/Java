<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>會員登入 - TECO 購物通</title>
    <link rel="stylesheet" href="product.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .auth-form input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .auth-btn { width: 100%; background: #e5004f; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .auth-footer a { color: #e5004f; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 style="text-align: center; color: #e5004f;">會員登入</h2>
        <form class="auth-form" id="loginForm">
            <input type="text" id="username" placeholder="帳號 / 手機號碼" required>
            <input type="password" id="password" placeholder="密碼" required>
            <button type="submit" class="auth-btn">登入</button>
        </form>
        <div class="auth-footer">
            還沒有帳號？ <a href="register.html">立即註冊</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('#loginForm').submit(function(e) {
            e.preventDefault();
            const user = $('#username').val();
            // 模擬登入成功：存入 localStorage
            localStorage.setItem('loginUser', user);
            alert('登入成功！');
            window.location.href = 'index.html'; // 跳回首頁
        });
    </script>
</body>
</html>
