<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員註冊</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
	<div id="message-toast" class="toast-hidden"></div>
    <div class="auth-wrapper">
        <h2 class="auth-title">會員註冊</h2>
        <form id="regForm">
            <div class="input-group">
                <label for="name">姓名</label>
                <input type="text" id="name" placeholder="請輸入姓名" required>
            </div>
            <div class="input-group">
                <label for="email">電子信箱</label>
                <input type="email" id="email" placeholder="example@momo.com" required>
            </div>
            <div class="input-group">
                <label for="password">密碼</label>
                <input type="password" id="password" placeholder="請輸入密碼" required>
            </div>
            <div class="input-group">
                <label for="confirmPassword">確認密碼</label>
                <input type="password" id="confirmPassword" placeholder="請再次輸入密碼" required>
            </div>
            <button type="submit" class="btn-momo">立即註冊</button>
        </form>
        <p class="auth-footer">已有帳號？ <a href="login2.html">前往登入</a></p>
    </div>
    <script src="/static/js/auth.js"></script>
</body>
</html>
