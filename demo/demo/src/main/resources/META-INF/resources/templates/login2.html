<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
	<div id="message-toast" class="toast-hidden"></div>
    <div class="auth-wrapper">
        <h2 class="auth-title">會員登入</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="loginEmail">電子信箱</label>
                <input type="email" id="loginEmail" placeholder="請輸入電子信箱" required>
            </div>
            <div class="input-group">
                <label for="loginPass">密碼</label>
                <input type="password" id="loginPass" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="btn-momo">登入</button>
        </form>
        <p class="auth-footer">還沒加入會員？ <a href="register.html">免費註冊</a></p>
    </div>
    <script src="/static/js/auth.js"></script>
</body>
</html>
