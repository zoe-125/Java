<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeStyle 購物車</title>
    <link rel="stylesheet" href="/static/css/product.css">    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="main-header">
    <div class="container-wide">
        <div class="logo">LifeStyle 購物</div>        
    </div>
</header>

<div class="container cart-page">
    <h2 class="page-title">購物車</h2>
    <div class="cart-container">
        <div class="cart-left-column">
            <div class="cart-items" id="cartItemsList"></div>        	

            <div class="checkout-info-section" id="checkoutInfo" style="display: none; margin-top: 20px;">
                <h3>收件人資訊</h3>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="receiverName" placeholder="請輸入收件人姓名">
                </div>
                <div class="form-group">
                    <label>電話</label>
                    <input type="tel" id="receiverPhone" placeholder="請輸入聯絡電話">
                </div>
                <div class="form-group">
                    <label>收件地址</label>
                    <input type="text" id="receiverAddress" placeholder="請輸入配送地址">
                </div>
            </div>
        </div>
              
        <div class="cart-summary">
            <h3>訂單摘要</h3>
            <div class="summary-row"><span>商品小計</span><span id="subtotal">$ 0</span></div>
            <div class="summary-row"><span>運費</span><span id="shipping">$ 0</span></div>
            <div class="summary-row promo"><span>活動折抵</span><span id="discount">-$ 200</span></div>
            <hr>
            <div class="summary-row total"><span>結帳總額</span><span id="finalTotal">$ 0</span></div> 
            <div class="cart-summary-buttons">
            	<button class="btn-checkout">前往結帳</button>  
           		<a href="index.html" class="continue-shopping">繼續購物</a>
        </div>
    </div>
</div>

<div id="delete-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3>確認刪除</h3>
        <p>您確定要將此商品從購物車中移除嗎？</p>
        <div class="modal-buttons">
            <button id="btn-cancel-delete" class="btn-secondary">取消</button>
            <button id="btn-confirm-delete" class="btn-danger">確定移除</button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/static/js/cart.js"></script>
</body>
</html>
