<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeStyle 我的訂單</title>
    <link rel="stylesheet" href="/static/css/product.css">    
    <link rel="stylesheet" href="/static/css/order.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="body">

<header class="main-header">
    <div class="container-wide">
        <div class="logo">LifeStyle 我的訂單</div>
    </div>
</header>

<div class="order-page-container">
    <h2 class="page-title">歷史訂單查詢</h2>
    
    <div id="order-list-container">
        <div class="empty-order-msg">正在載入您的訂單紀錄...</div>
    </div>
    
    <div class="continue-shopping-wrapper">
        <a href="index.html" class="continue-shopping">
            <i class="fas fa-arrow-left"></i> 回首頁繼續購物
        </a>
    </div>
</div>

<div id="order-detail-modal" class="custom-modal">
    <div class="modal-content">
        <span class="close-btn" id="close-modal-x">&times;</span>
        <h3>訂單詳情</h3>
        <hr>
        <p><strong>訂單編號：</strong> <span id="detail-id"></span></p>
        
        <div class="shipping-info">
            <h4>收件資訊</h4>
            <p><strong>收件人：</strong><span id="detail-name"></span></p>
            <p><strong>手機號碼：</strong><span id="detail-phone"></span></p>
            <p><strong>收件地址：</strong><span id="detail-address"></span></p>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/static/js/order.js"></script>
</body>
</html>
