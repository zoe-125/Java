<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>LifeStyle - 會員登入</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
	<div id="message-toast" class="toast-hidden"></div>
    <div class="auth-wrapper">
        <h2 class="auth-title">WELCOME BACK</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">電子信箱</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <div class="input-group">
                <label for="password">密碼</label>
                <input type="password" id="password" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="btn-momo">登入</button>
        </form>
        <div class="auth-footer">
            還沒有帳號？ <a href="/register.html">立即註冊</a>
            <a href="/forgotPassword.html" style="margin-top: 10px; display: inline-block;">忘記密碼？</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
