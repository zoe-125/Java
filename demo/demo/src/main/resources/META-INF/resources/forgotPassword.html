<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>忘記密碼</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="message-toast" class="toast-hidden"></div>
    <div class="auth-wrapper">
        <h2 class="auth-title">忘記密碼</h2>
        <form id="forgotForm">
            <div class="input-group">
                <label for="email">電子信箱</label>
                <div style="display: flex; gap: 10px;">
                    <input type="email" id="email" placeholder="example@mail.com" required>
                    <button type="submit" id="btn-verify" class="btn-momo" style="width: auto; margin: 0; white-space: nowrap; padding: 0 15px;">寄送重設信</button>
                </div>
            </div>
            
            </form>
        
        <div class="auth-footer">
            <a href="/login.html">返回登入</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/static/js/forgotPassword.js"></script>
</body>
</html>
