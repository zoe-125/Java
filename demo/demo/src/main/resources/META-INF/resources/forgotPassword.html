<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>忘記密碼</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
	<div id="message-toast" class="toast-hidden"></div>
    <div class="auth-wrapper">
    <h2 class="auth-title">忘記密碼</h2>
    <form id="forgotForm">
        <div class="input-group">
            <label for="email">電子信箱</label>
            <div style="display: flex; gap: 10px;">
                <input type="email" id="email" placeholder="example@mail.com" required>
                <button type="button" id="btn-verify" class="btn-momo" style="width: auto; margin: 0; white-space: nowrap; padding: 0 15px;">驗證</button>
            </div>
        </div>

        <div id="password-fields" style="display: none;">
            <div class="input-group">
                <label for="newPassword">設定密碼</label>
                <input type="password" id="newPassword" placeholder="至少 8 位字元">
            </div>
            <div class="input-group">
                <label for="confirmPassword">確認密碼</label>
                <input type="password" id="confirmPassword" placeholder="再次輸入密碼">
            </div>
            <button type="submit" class="btn-momo">確認</button>
        </div>
    </form>
    
    <div class="auth-footer">
        <a href="/login.html">返回登入</a>
    </div>
</div>

<div id="message-toast" class="toast-hidden"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/static/js/forgotPassword.js"></script>
</body>
</html>
